stages:
  - sast
  - sca
  - build
  - container-scan
  - gate
  - push-ecr
  - deploy

variables:
  AWS_REGION: "ap-southeast-1"

include:
  - local: '.gitlab-deploy.yml'
    rules:
      - exists: ['.gitlab-deploy.yml']


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1: SAST — Semgrep
# ─────────────────────────────────────────────────────────────────────────────
sast-semgrep:
  stage: sast
  image:
    name: python:3.11-alpine
    entrypoint: [""]
  before_script:
    - apk add --no-cache curl bash
    - pip install semgrep --quiet
  script:
    - STAGE_START_EPOCH=$(date +%s)
    - semgrep scan --config=auto --json --output=semgrep-report.json . || true
    - END_EPOCH=$(date +%s)
    - DURATION=$((END_EPOCH - STAGE_START_EPOCH))
    - TOTAL=$(python3 -c "import json,sys;d=json.load(open('semgrep-report.json'));r=d.get('results',[]);e=len([x for x in r if x.get('extra',{}).get('severity','')==
        'ERROR']);w=len([x for x in r if x.get('extra',{}).get('severity','')=='WARNING']);print(f'{len(r)}|{e}|{w}')" 2>/dev/null || echo "0|0|0")
    - T=$(echo "$TOTAL" | cut -d'|' -f1)
    - E=$(echo "$TOTAL" | cut -d'|' -f2)
    - W=$(echo "$TOTAL" | cut -d'|' -f3)
    - RISK=$((E * 10 + W * 3))
    - if [ "${E}" -gt 0 ]; then GATE_PASSED="false"; else GATE_PASSED="true"; fi
    - TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    - "curl -s --max-time 5 -X POST \"${LOGSTASH_URL}\" -H 'Content-Type: application/json' -d \"{\\\"@timestamp\\\":\\\"${TS}\\\",\\\"event_type\\\":\\\"scan_result\\\",\\\"pipeline_id\\\":\\\"${CI_PIPELINE_ID}\\\",\\\"job_id\\\":\\\"${CI_JOB_ID}\\\",\\\"stage\\\":\\\"sast\\\",\\\"tool\\\":\\\"semgrep\\\",\\\"branch\\\":\\\"${CI_COMMIT_BRANCH}\\\",\\\"commit\\\":\\\"${CI_COMMIT_SHORT_SHA}\\\",\\\"project\\\":\\\"${CI_PROJECT_NAME}\\\",\\\"duration_seconds\\\":${DURATION},\\\"findings\\\":{\\\"total\\\":${T},\\\"error\\\":${E},\\\"warning\\\":${W}},\\\"risk_score\\\":${RISK},\\\"gate_passed\\\":${GATE_PASSED},\\\"message\\\":\\\"Semgrep scan completed\\\"}\" || true"
    - if [ "${GATE_PASSED}" = "false" ]; then echo "SAST FAILED" && exit 1; fi
  allow_failure: true
  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: 30 days


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2: SCA — Trivy filesystem
# ─────────────────────────────────────────────────────────────────────────────
sca-trivy:
  stage: sca
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache curl bash python3
  script:
    - STAGE_START_EPOCH=$(date +%s)
    - trivy fs . --severity HIGH,CRITICAL --pkg-types library --format json --output trivy-sca-report.json || true
    - END_EPOCH=$(date +%s)
    - DURATION=$((END_EPOCH - STAGE_START_EPOCH))
    - STATS=$(python3 -c "import json;d=json.load(open('trivy-sca-report.json'));c=sum(1 for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='CRITICAL');h=sum(1 for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='HIGH');t=c+h;print(f'{t}|{c}|{h}')" 2>/dev/null || echo "0|0|0")
    - T=$(echo "$STATS" | cut -d'|' -f1)
    - C=$(echo "$STATS" | cut -d'|' -f2)
    - H=$(echo "$STATS" | cut -d'|' -f3)
    - RISK=$((C * 10 + H * 5))
    - if [ "${C}" -gt 0 ] || [ "${H}" -gt 0 ]; then GATE_PASSED="false"; else GATE_PASSED="true"; fi
    - TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    - "curl -s --max-time 5 -X POST \"${LOGSTASH_URL}\" -H 'Content-Type: application/json' -d \"{\\\"@timestamp\\\":\\\"${TS}\\\",\\\"event_type\\\":\\\"scan_result\\\",\\\"pipeline_id\\\":\\\"${CI_PIPELINE_ID}\\\",\\\"job_id\\\":\\\"${CI_JOB_ID}\\\",\\\"stage\\\":\\\"sca\\\",\\\"tool\\\":\\\"trivy-fs\\\",\\\"branch\\\":\\\"${CI_COMMIT_BRANCH}\\\",\\\"commit\\\":\\\"${CI_COMMIT_SHORT_SHA}\\\",\\\"project\\\":\\\"${CI_PROJECT_NAME}\\\",\\\"duration_seconds\\\":${DURATION},\\\"findings\\\":{\\\"total\\\":${T},\\\"critical\\\":${C},\\\"high\\\":${H}},\\\"risk_score\\\":${RISK},\\\"gate_passed\\\":${GATE_PASSED},\\\"message\\\":\\\"Trivy SCA scan completed\\\"}\" || true"
    - if [ "${GATE_PASSED}" = "false" ]; then echo "SCA FAILED critical=${C} high=${H}" && exit 1; fi
  allow_failure: true
  artifacts:
    when: always
    paths:
      - trivy-sca-report.json
    expire_in: 30 days


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3: BUILD Docker image
# ─────────────────────────────────────────────────────────────────────────────
build-image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    IMAGE_LOCAL_TAG: "$CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA"
  before_script:
    - apk add --no-cache curl
  script:
    - STAGE_START_EPOCH=$(date +%s)
    - docker build -t $IMAGE_LOCAL_TAG .
    - docker save $IMAGE_LOCAL_TAG > image.tar
    - END_EPOCH=$(date +%s)
    - DURATION=$((END_EPOCH - STAGE_START_EPOCH))
    - IMAGE_SIZE=$(du -sb image.tar | cut -f1)
    - TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    - "curl -s --max-time 5 -X POST \"${LOGSTASH_URL}\" -H 'Content-Type: application/json' -d \"{\\\"@timestamp\\\":\\\"${TS}\\\",\\\"event_type\\\":\\\"build_result\\\",\\\"pipeline_id\\\":\\\"${CI_PIPELINE_ID}\\\",\\\"job_id\\\":\\\"${CI_JOB_ID}\\\",\\\"stage\\\":\\\"build\\\",\\\"tool\\\":\\\"docker\\\",\\\"branch\\\":\\\"${CI_COMMIT_BRANCH}\\\",\\\"commit\\\":\\\"${CI_COMMIT_SHORT_SHA}\\\",\\\"project\\\":\\\"${CI_PROJECT_NAME}\\\",\\\"duration_seconds\\\":${DURATION},\\\"image\\\":{\\\"tag\\\":\\\"${IMAGE_LOCAL_TAG}\\\",\\\"size_bytes\\\":${IMAGE_SIZE}},\\\"gate_passed\\\":true,\\\"message\\\":\\\"Docker image built\\\"}\" || true"
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour
  rules:
    - exists:
        - Dockerfile


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4: CONTAINER SCAN — Trivy image
# ─────────────────────────────────────────────────────────────────────────────
container-scan:
  stage: container-scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache curl bash python3
  script:
    - STAGE_START_EPOCH=$(date +%s)
    - trivy image --input image.tar --severity HIGH,CRITICAL --pkg-types os --format json --output trivy-image-report.json || true
    - END_EPOCH=$(date +%s)
    - DURATION=$((END_EPOCH - STAGE_START_EPOCH))
    - STATS=$(python3 -c "import json;d=json.load(open('trivy-image-report.json'));c=sum(1 for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='CRITICAL');h=sum(1 for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='HIGH');t=c+h;print(f'{t}|{c}|{h}')" 2>/dev/null || echo "0|0|0")
    - T=$(echo "$STATS" | cut -d'|' -f1)
    - C=$(echo "$STATS" | cut -d'|' -f2)
    - H=$(echo "$STATS" | cut -d'|' -f3)
    - RISK=$((C * 10 + H * 5))
    - if [ "${C}" -gt 0 ] || [ "${H}" -gt 0 ]; then GATE_PASSED="false"; else GATE_PASSED="true"; fi
    - TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    - "curl -s --max-time 5 -X POST \"${LOGSTASH_URL}\" -H 'Content-Type: application/json' -d \"{\\\"@timestamp\\\":\\\"${TS}\\\",\\\"event_type\\\":\\\"scan_result\\\",\\\"pipeline_id\\\":\\\"${CI_PIPELINE_ID}\\\",\\\"job_id\\\":\\\"${CI_JOB_ID}\\\",\\\"stage\\\":\\\"container-scan\\\",\\\"tool\\\":\\\"trivy-image\\\",\\\"branch\\\":\\\"${CI_COMMIT_BRANCH}\\\",\\\"commit\\\":\\\"${CI_COMMIT_SHORT_SHA}\\\",\\\"project\\\":\\\"${CI_PROJECT_NAME}\\\",\\\"duration_seconds\\\":${DURATION},\\\"findings\\\":{\\\"total\\\":${T},\\\"critical\\\":${C},\\\"high\\\":${H}},\\\"risk_score\\\":${RISK},\\\"gate_passed\\\":${GATE_PASSED},\\\"message\\\":\\\"Trivy image scan completed\\\"}\" || true"
    - if [ "${GATE_PASSED}" = "false" ]; then echo "Container scan FAILED" && exit 1; fi
  allow_failure: true
  artifacts:
    when: always
    paths:
      - trivy-image-report.json
    expire_in: 30 days
  needs:
    - build-image
  rules:
    - exists:
        - Dockerfile


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 5: GATE — Summary of result
# ─────────────────────────────────────────────────────────────────────────────
security-gate:
  stage: gate
  image: alpine:latest
  before_script:
    - apk add --no-cache curl python3
  script:
    - SUMMARY=$(python3 -c "import json;sg=json.load(open('semgrep-report.json')) if __import__('os').path.exists('semgrep-report.json') else {};fs=json.load(open('trivy-sca-report.json')) if __import__('os').path.exists('trivy-sca-report.json') else {};img=json.load(open('trivy-image-report.json')) if __import__('os').path.exists('trivy-image-report.json') else {};se=len([r for r in sg.get('results',[]) if r.get('extra',{}).get('severity','')=='ERROR']);sw=len([r for r in sg.get('results',[]) if r.get('extra',{}).get('severity','')=='WARNING']);fc=sum(1 for r in fs.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='CRITICAL');fh=sum(1 for r in fs.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='HIGH');ic=sum(1 for r in img.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='CRITICAL');ih=sum(1 for r in img.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='HIGH');risk=se*10+sw*3+fc*10+fh*5+ic*10+ih*5;level='critical' if risk>=50 else 'high' if risk>=20 else 'medium' if risk>=5 else 'low';print(f'{se}|{sw}|{fc}|{fh}|{ic}|{ih}|{risk}|{level}')" 2>/dev/null || echo "0|0|0|0|0|0|0|unknown")
    - SG_E=$(echo "$SUMMARY" | cut -d'|' -f1)
    - SG_W=$(echo "$SUMMARY" | cut -d'|' -f2)
    - FS_C=$(echo "$SUMMARY" | cut -d'|' -f3)
    - FS_H=$(echo "$SUMMARY" | cut -d'|' -f4)
    - IM_C=$(echo "$SUMMARY" | cut -d'|' -f5)
    - IM_H=$(echo "$SUMMARY" | cut -d'|' -f6)
    - RISK=$(echo "$SUMMARY" | cut -d'|' -f7)
    - LEVEL=$(echo "$SUMMARY" | cut -d'|' -f8)
    - TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    - "curl -s --max-time 5 -X POST \"${LOGSTASH_URL}\" -H 'Content-Type: application/json' -d \"{\\\"@timestamp\\\":\\\"${TS}\\\",\\\"event_type\\\":\\\"pipeline_summary\\\",\\\"pipeline_id\\\":\\\"${CI_PIPELINE_ID}\\\",\\\"job_id\\\":\\\"${CI_JOB_ID}\\\",\\\"stage\\\":\\\"gate\\\",\\\"branch\\\":\\\"${CI_COMMIT_BRANCH}\\\",\\\"commit\\\":\\\"${CI_COMMIT_SHORT_SHA}\\\",\\\"project\\\":\\\"${CI_PROJECT_NAME}\\\",\\\"summary\\\":{\\\"sast\\\":{\\\"error\\\":${SG_E},\\\"warning\\\":${SG_W}},\\\"sca\\\":{\\\"critical\\\":${FS_C},\\\"high\\\":${FS_H}},\\\"container\\\":{\\\"critical\\\":${IM_C},\\\"high\\\":${IM_H}}},\\\"risk_score\\\":${RISK},\\\"risk_level\\\":\\\"${LEVEL}\\\",\\\"message\\\":\\\"Security gate completed\\\"}\" || true"
    - echo "=== Security Gate ==="
    - echo "SAST      error=${SG_E} warning=${SG_W}"
    - echo "SCA       critical=${FS_C} high=${FS_H}"
    - echo "Container critical=${IM_C} high=${IM_H}"
    - echo "Risk      ${RISK} (${LEVEL})"
  needs:
    - sast-semgrep
    - sca-trivy
  artifacts:
    when: always
    paths:
      - semgrep-report.json
      - trivy-sca-report.json
      - trivy-image-report.json
    expire_in: 90 days
