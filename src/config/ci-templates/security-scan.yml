
stages:
  - sast
  - sca
  - build
  - container-scan
  - gate
  - push-ecr
  - deploy

variables:
  AWS_REGION: "ap-southeast-1"

include:
  - local: '.gitlab-deploy.yml'
    rules:
      - exists: ['.gitlab-deploy.yml']


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# STAGE 1: SAST вЂ” Semgrep
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
sast-semgrep:
  stage: sast
  image:
    name: returntocorp/semgrep:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache curl
    - STAGE_START_EPOCH=$(date +%s)
    - |
      send_log() {
        curl -s -X POST "${LOGSTASH_URL}" \
          -H "Content-Type: application/json" \
          -d "$1" || true
      }
  script:
    - semgrep scan --config=auto --json --output=semgrep-report.json . || true
    - |
      END_EPOCH=$(date +%s)
      DURATION=$((END_EPOCH - STAGE_START_EPOCH))

      TOTAL=$(python3 -c "
      import json
      try:
        d = json.load(open('semgrep-report.json'))
        results = d.get('results', [])
        total = len(results)
        error = len([r for r in results if r.get('extra',{}).get('severity','') == 'ERROR'])
        warn  = len([r for r in results if r.get('extra',{}).get('severity','') == 'WARNING'])
        from collections import Counter
        top = ';'.join([k for k,_ in Counter(r.get('check_id','') for r in results).most_common(3)])
        print(f'{total}|{error}|{warn}|{top}')
      except:
        print('0|0|0|')
      " 2>/dev/null || echo "0|0|0|")

      T=$(echo $TOTAL | cut -d'|' -f1)
      E=$(echo $TOTAL | cut -d'|' -f2)
      W=$(echo $TOTAL | cut -d'|' -f3)
      TOP=$(echo $TOTAL | cut -d'|' -f4)
      RISK=$((E * 10 + W * 3))

      send_log "{
        \"@timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
        \"event_type\":\"scan_result\",
        \"pipeline_id\":\"${CI_PIPELINE_ID}\",
        \"job_id\":\"${CI_JOB_ID}\",
        \"stage\":\"sast\",
        \"tool\":\"semgrep\",
        \"branch\":\"${CI_COMMIT_BRANCH}\",
        \"commit\":\"${CI_COMMIT_SHORT_SHA}\",
        \"author\":\"${CI_COMMIT_AUTHOR}\",
        \"project\":\"${CI_PROJECT_NAME}\",
        \"duration_seconds\":${DURATION},
        \"findings\":{\"total\":${T},\"error\":${E},\"warning\":${W},\"top_rules\":\"${TOP}\"},
        \"risk_score\":${RISK},
        \"gate_passed\":$([ ${E} -eq 0 ] && echo true || echo false),
        \"message\":\"Semgrep scan completed\"
      }"

      if [ "${E}" -gt 0 ]; then
        echo "SAST FAILED: ${E} error-level findings"
        exit 1
      fi
  allow_failure: true
  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: 30 days


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# STAGE 2: SCA вЂ” Trivy filesystem
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
sca-trivy:
  stage: sca
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache curl python3
    - STAGE_START_EPOCH=$(date +%s)
    - |
      send_log() {
        curl -s -X POST "${LOGSTASH_URL}" -H "Content-Type: application/json" -d "$1" || true
      }
  script:
    - trivy fs . --severity HIGH,CRITICAL --vuln-type library --format json --output trivy-sca-report.json || true
    - |
      END_EPOCH=$(date +%s)
      DURATION=$((END_EPOCH - STAGE_START_EPOCH))

      STATS=$(python3 -c "
      import json
      try:
        d = json.load(open('trivy-sca-report.json'))
        total = 0; critical = 0; high = 0
        from collections import Counter; cve_counter = Counter()
        for r in d.get('Results', []):
          for v in (r.get('Vulnerabilities') or []):
            total += 1
            if v.get('Severity') == 'CRITICAL': critical += 1
            elif v.get('Severity') == 'HIGH': high += 1
            cve_counter[v.get('VulnerabilityID','')] += 1
        top = ';'.join([k for k,_ in cve_counter.most_common(3)])
        print(f'{total}|{critical}|{high}|{top}')
      except:
        print('0|0|0|')
      " 2>/dev/null || echo "0|0|0|")

      T=$(echo $STATS | cut -d'|' -f1)
      C=$(echo $STATS | cut -d'|' -f2)
      H=$(echo $STATS | cut -d'|' -f3)
      RISK=$((C * 10 + H * 5))

      send_log "{
        \"@timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
        \"event_type\":\"scan_result\",
        \"pipeline_id\":\"${CI_PIPELINE_ID}\",
        \"job_id\":\"${CI_JOB_ID}\",
        \"stage\":\"sca\",
        \"tool\":\"trivy-fs\",
        \"branch\":\"${CI_COMMIT_BRANCH}\",
        \"commit\":\"${CI_COMMIT_SHORT_SHA}\",
        \"author\":\"${CI_COMMIT_AUTHOR}\",
        \"project\":\"${CI_PROJECT_NAME}\",
        \"duration_seconds\":${DURATION},
        \"findings\":{\"total\":${T},\"critical\":${C},\"high\":${H}},
        \"risk_score\":${RISK},
        \"gate_passed\":$([ ${C} -eq 0 ] && [ ${H} -eq 0 ] && echo true || echo false),
        \"message\":\"Trivy SCA scan completed\"
      }"

      if [ "${C}" -gt 0 ] || [ "${H}" -gt 0 ]; then
        echo "SCA FAILED: critical=${C} high=${H}"
        exit 1
      fi
  allow_failure: true
  artifacts:
    when: always
    paths:
      - trivy-sca-report.json
    expire_in: 30 days


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# STAGE 3: BUILD Docker image
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
build-image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    IMAGE_LOCAL_TAG: "$CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA"
  before_script:
    - apk add --no-cache curl
    - STAGE_START_EPOCH=$(date +%s)
  script:
    - docker build -t $IMAGE_LOCAL_TAG .
    - docker save $IMAGE_LOCAL_TAG > image.tar
    - |
      END_EPOCH=$(date +%s)
      DURATION=$((END_EPOCH - STAGE_START_EPOCH))
      IMAGE_SIZE=$(du -sb image.tar | cut -f1)
      curl -s -X POST "${LOGSTASH_URL}" -H "Content-Type: application/json" -d "{
        \"@timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
        \"event_type\":\"build_result\",
        \"pipeline_id\":\"${CI_PIPELINE_ID}\",
        \"job_id\":\"${CI_JOB_ID}\",
        \"stage\":\"build\",
        \"tool\":\"docker\",
        \"branch\":\"${CI_COMMIT_BRANCH}\",
        \"commit\":\"${CI_COMMIT_SHORT_SHA}\",
        \"author\":\"${CI_COMMIT_AUTHOR}\",
        \"project\":\"${CI_PROJECT_NAME}\",
        \"duration_seconds\":${DURATION},
        \"image\":{\"tag\":\"${IMAGE_LOCAL_TAG}\",\"size_bytes\":${IMAGE_SIZE}},
        \"gate_passed\":true,
        \"message\":\"Docker image built\"
      }" || true
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour
  rules:
    - exists:
        - Dockerfile


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# STAGE 4: CONTAINER SCAN вЂ” Trivy image
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
container-scan:
  stage: container-scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache curl python3
    - STAGE_START_EPOCH=$(date +%s)
  script:
    - trivy image --input image.tar --severity HIGH,CRITICAL --vuln-type os --format json --output trivy-image-report.json || true
    - |
      END_EPOCH=$(date +%s)
      DURATION=$((END_EPOCH - STAGE_START_EPOCH))

      STATS=$(python3 -c "
      import json
      try:
        d = json.load(open('trivy-image-report.json'))
        total = 0; critical = 0; high = 0
        from collections import Counter; cve_counter = Counter()
        for r in d.get('Results', []):
          for v in (r.get('Vulnerabilities') or []):
            total += 1
            if v.get('Severity') == 'CRITICAL': critical += 1
            elif v.get('Severity') == 'HIGH': high += 1
            cve_counter[v.get('VulnerabilityID','')] += 1
        top = ';'.join([k for k,_ in cve_counter.most_common(3)])
        print(f'{total}|{critical}|{high}|{top}')
      except:
        print('0|0|0|')
      " 2>/dev/null || echo "0|0|0|")

      T=$(echo $STATS | cut -d'|' -f1)
      C=$(echo $STATS | cut -d'|' -f2)
      H=$(echo $STATS | cut -d'|' -f3)
      RISK=$((C * 10 + H * 5))

      curl -s -X POST "${LOGSTASH_URL}" -H "Content-Type: application/json" -d "{
        \"@timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
        \"event_type\":\"scan_result\",
        \"pipeline_id\":\"${CI_PIPELINE_ID}\",
        \"job_id\":\"${CI_JOB_ID}\",
        \"stage\":\"container-scan\",
        \"tool\":\"trivy-image\",
        \"branch\":\"${CI_COMMIT_BRANCH}\",
        \"commit\":\"${CI_COMMIT_SHORT_SHA}\",
        \"author\":\"${CI_COMMIT_AUTHOR}\",
        \"project\":\"${CI_PROJECT_NAME}\",
        \"duration_seconds\":${DURATION},
        \"findings\":{\"total\":${T},\"critical\":${C},\"high\":${H}},
        \"risk_score\":${RISK},
        \"gate_passed\":$([ ${C} -eq 0 ] && [ ${H} -eq 0 ] && echo true || echo false),
        \"message\":\"Trivy image scan completed\"
      }" || true

      if [ "${C}" -gt 0 ] || [ "${H}" -gt 0 ]; then
        echo "Container scan FAILED: critical=${C} high=${H}"
        exit 1
      fi
  allow_failure: true
  artifacts:
    when: always
    paths:
      - trivy-image-report.json
    expire_in: 30 days
  needs:
    - build-image
  rules:
    - exists:
        - Dockerfile


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# STAGE 5: GATE вЂ” Summy of result
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
security-gate:
  stage: gate
  image: alpine:latest
  before_script:
    - apk add --no-cache curl python3
  script:
    - |
      END_EPOCH=$(date +%s)

      SUMMARY=$(python3 -c "
      import json
      def load(p):
        try: return json.load(open(p))
        except: return {}

      sg   = load('semgrep-report.json')
      fs   = load('trivy-sca-report.json')
      img  = load('trivy-image-report.json')

      sg_e = len([r for r in sg.get('results',[]) if r.get('extra',{}).get('severity','') == 'ERROR'])
      sg_w = len([r for r in sg.get('results',[]) if r.get('extra',{}).get('severity','') == 'WARNING'])

      fs_c = sum(1 for r in fs.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity') == 'CRITICAL')
      fs_h = sum(1 for r in fs.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity') == 'HIGH')

      im_c = sum(1 for r in img.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity') == 'CRITICAL')
      im_h = sum(1 for r in img.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity') == 'HIGH')

      risk = sg_e*10 + sg_w*3 + fs_c*10 + fs_h*5 + im_c*10 + im_h*5
      level = 'critical' if risk>=50 else 'high' if risk>=20 else 'medium' if risk>=5 else 'low'
      print(f'{sg_e}|{sg_w}|{fs_c}|{fs_h}|{im_c}|{im_h}|{risk}|{level}')
      " 2>/dev/null || echo "0|0|0|0|0|0|0|unknown")

      SG_E=$(echo $SUMMARY | cut -d'|' -f1)
      SG_W=$(echo $SUMMARY | cut -d'|' -f2)
      FS_C=$(echo $SUMMARY | cut -d'|' -f3)
      FS_H=$(echo $SUMMARY | cut -d'|' -f4)
      IM_C=$(echo $SUMMARY | cut -d'|' -f5)
      IM_H=$(echo $SUMMARY | cut -d'|' -f6)
      RISK=$(echo $SUMMARY | cut -d'|' -f7)
      LEVEL=$(echo $SUMMARY | cut -d'|' -f8)

      curl -s -X POST "${LOGSTASH_URL}" -H "Content-Type: application/json" -d "{
        \"@timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
        \"event_type\":\"pipeline_summary\",
        \"pipeline_id\":\"${CI_PIPELINE_ID}\",
        \"job_id\":\"${CI_JOB_ID}\",
        \"stage\":\"gate\",
        \"branch\":\"${CI_COMMIT_BRANCH}\",
        \"commit\":\"${CI_COMMIT_SHORT_SHA}\",
        \"author\":\"${CI_COMMIT_AUTHOR}\",
        \"project\":\"${CI_PROJECT_NAME}\",
        \"summary\":{
          \"sast\":{\"error\":${SG_E},\"warning\":${SG_W}},
          \"sca\":{\"critical\":${FS_C},\"high\":${FS_H}},
          \"container\":{\"critical\":${IM_C},\"high\":${IM_H}}
        },
        \"risk_score\":${RISK},
        \"risk_level\":\"${LEVEL}\",
        \"message\":\"Security gate completed\"
      }" || true

      echo "=== Security Gate ==="
      echo "SAST:      error=${SG_E} warning=${SG_W}"
      echo "SCA:       critical=${FS_C} high=${FS_H}"
      echo "Container: critical=${IM_C} high=${IM_H}"
      echo "Risk:      ${RISK} (${LEVEL})"
  needs:
    - sast-semgrep
    - sca-trivy
  artifacts:
    when: always
    paths:
      - semgrep-report.json
      - trivy-sca-report.json
      - trivy-image-report.json
    expire_in: 90 days
