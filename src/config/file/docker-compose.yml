version: "3.8"

services:
  # PostgreSQL Database
  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-postgres
    hostname: postgresql
    networks:
      - sonarqube-network
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube_password
      POSTGRES_DB: sonarqube
    volumes:
      - ./postgresql_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SonarQube Server
  sonarqube:
    image: sonarqube:community  
    container_name: sonarqube-server
    hostname: sonarqube
    depends_on:
      sonarqube-db:
        condition: service_healthy
    networks:
      - sonarqube-network
    ports:
      - "9000:9000"  # Web UI
    environment:
      # Database configuration
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube_password
      
      # SonarQube settings
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      
      # Performance tuning (tùy RAM server)
      SONAR_WEB_JAVAADDITIONALOPTS: "-Xmx512m -Xms128m"
      SONAR_CE_JAVAADDITIONALOPTS: "-Xmx512m -Xms128m"
      SONAR_SEARCH_JAVAADDITIONALOPTS: "-Xmx512m -Xms512m"
      
    volumes:
      - ./sonarqube_data:/opt/sonarqube/data
      - ./sonarqube_extensions:/opt/sonarqube/extensions
      - ./sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

networks:
  sonarqube-network:
    driver: bridge
